<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root{
    --xhs-red:#ff2442;
    --fg:#1f1f1f;
    --muted:#8a8a8a;
    --border:#ececec;
  }
  *{box-sizing:border-box;}
  body{width:368px;margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--fg);background:#fff;}
  .wrap{padding:14px 16px 18px;}
  h1{font-size:15px;margin:0 0 2px;display:flex;align-items:center;gap:6px;}
  h1 .dot{width:8px;height:8px;border-radius:50%;background:var(--xhs-red);}
  .sub{font-size:11px;color:var(--muted);margin:0 0 12px;}
  label{font-size:12px;font-weight:600;display:block;margin:10px 0 4px;}
  textarea{width:100%;height:88px;resize:vertical;border:1px solid var(--border);border-radius:8px;padding:8px;font-size:12px;line-height:1.5;outline:none;}
  textarea:focus{border-color:var(--xhs-red);}
  .row{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap;}
  select,input[type=number]{border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:12px;outline:none;}
  select:focus,input:focus{border-color:var(--xhs-red);}
  .btns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  button{flex:1;border:none;border-radius:8px;padding:9px 10px;font-size:13px;font-weight:600;cursor:pointer;transition:transform .08s ease,opacity .2s;}
  button:active{transform:scale(.97);}
  button:disabled{opacity:.5;cursor:not-allowed;}
  .btn-primary{background:var(--xhs-red);color:#fff;}
  .btn-ghost{background:#f5f5f5;color:#333;}
  .btn-line{background:#fff;border:1px solid var(--border);color:#333;flex:none;padding:9px 12px;}
  .status{margin-top:12px;font-size:12px;background:#fafafa;border:1px solid var(--border);border-radius:8px;padding:8px 10px;min-height:20px;line-height:1.5;}
  .status .k{color:var(--xhs-red);font-weight:600;}
  .progress{height:6px;background:#f0f0f0;border-radius:4px;overflow:hidden;margin-top:8px;}
  .progress > i{display:block;height:100%;width:0;background:var(--xhs-red);transition:width .3s;}
  .results{margin-top:10px;max-height:210px;overflow:auto;border:1px solid var(--border);border-radius:8px;}
  table{width:100%;border-collapse:collapse;font-size:11px;}
  th,td{text-align:left;padding:5px 8px;border-bottom:1px solid #f2f2f2;}
  th{position:sticky;top:0;background:#fafafa;color:var(--muted);font-weight:600;}
  td.lv{color:var(--xhs-red);font-weight:600;width:32px;text-align:center;}
  .empty{color:var(--muted);padding:14px;text-align:center;font-size:11px;}
  .foot{margin-top:12px;display:flex;gap:8px;}
  .hint{font-size:10px;color:var(--muted);margin-top:6px;line-height:1.5;}
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="dot"></span>小红书下拉词批量采集器</h1>
  <p class="sub">批量种子词 · 递归长尾挖掘 · CSV/TXT 导出</p>

  <label for="seeds">种子词（每行一个）</label>
  <textarea id="seeds" placeholder="虾仁&#10;减脂餐&#10;一人食&#10;三文鱼"></textarea>

  <div class="row">
    <label style="margin:0;">递归层级</label>
    <select id="depth">
      <option value="1">1 层（仅种子）</option>
      <option value="2" selected>2 层（种子 + 下钻）</option>
      <option value="3">3 层（深度长尾）</option>
    </select>
    <label style="margin:0 0 0 4px;">间隔(ms)</label>
    <input id="delay" type="number" value="900" min="300" max="15000" step="100" style="width:78px;">
  </div>

  <div class="btns">
    <button id="start" class="btn-primary">▶ 开始采集</button>
    <button id="stop" class="btn-ghost" style="display:none;">■ 停止</button>
    <button id="current" class="btn-line">采集当前下拉</button>
  </div>

  <div class="status" id="status">就绪。先打开小红书页面，再点开始。</div>
  <div class="progress"><i id="bar"></i></div>

  <div class="results" id="resultsBox">
    <div class="empty">暂无数据</div>
  </div>

  <div class="foot">
    <button id="exportCsv" class="btn-ghost">导出 CSV</button>
    <button id="exportTxt" class="btn-ghost">导出 TXT</button>
    <button id="diagnose" class="btn-line">诊断</button>
    <button id="clear" class="btn-line">清空</button>
  </div>
  <p class="hint">建议间隔 ≥ 800ms；连续 5 次无词会自动暂停（防风控）。结果存本地。采集期间请保持弹窗打开以维持后台运行；若自动输入不触发下拉，可用「采集当前下拉」手动输入后采集。</p>
</div>
<script src="popup.js"></script>
</body>
</html>
