<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>红书选词助手</title>
<script>
  /*
   * 主题系统（第一性原理重构）
   * 不变量：applyTheme 是设置 data-theme 的唯一出口；initialized 标记防止异步回调覆盖用户切换；
   * chrome.storage 优先（扩展环境跨窗口同步），localStorage 兜底（独立预览文件持久化）。
   */
  (function () {
    var root = document.documentElement;
    var KEY = 'xhsTheme';
    var initialized = false;

    function resolveSystem() {
      return (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
    }

    // 唯一应用函数：写属性 + 同步按钮图标
    function applyTheme(t) {
      if (t === 'dark') root.setAttribute('data-theme', 'dark');
      else root.removeAttribute('data-theme'); // 移除属性 = 回到 :root 浅色默认
      var btn = document.getElementById('themeToggle');
      if (btn) btn.textContent = (t === 'dark') ? '☀️' : '🌙';
    }

    function persist(t) {
      try {
        if (typeof chrome !== 'undefined' && chrome.storage && chrome.storage.local) {
          chrome.storage.local.set({ [KEY]: t });
        } else if (typeof localStorage !== 'undefined') {
          localStorage.setItem(KEY, t);
        }
      } catch (e) {}
    }

    function readStored(cb) {
      try {
        if (typeof chrome !== 'undefined' && chrome.storage && chrome.storage.local) {
          chrome.storage.local.get([KEY], function (s) { cb(s && s[KEY] ? s[KEY] : null); });
          return;
        }
      } catch (e) {}
      try { cb(localStorage.getItem(KEY) || null); }
      catch (e) { cb(null); }
    }

    // 切换：取反当前态，立即应用 + 持久化，并标记已初始化（防异步回调覆盖）
    function toggleTheme() {
      initialized = true;
      var now = root.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
      var next = now === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      persist(next);
    }

    // 1) 同步初始化（防 FOUC 闪烁）：先用系统偏好立即上色
    applyTheme(resolveSystem());

    // 2) 异步校正：读存储覆盖系统偏好；若用户已手动切换则跳过
    readStored(function (stored) {
      if (initialized) return;
      applyTheme(stored || resolveSystem());
      initialized = true;
    });

    // 3) DOM 就绪后绑定点击（脚本在 head，此时按钮可能尚未解析）
    function bindToggle() {
      var btn = document.getElementById('themeToggle');
      if (btn) btn.addEventListener('click', toggleTheme);
    }
    if (document.readyState !== 'loading') bindToggle();
    else document.addEventListener('DOMContentLoaded', bindToggle);

    // 4) 跟随系统偏好变化（仅当用户未手动设置时）
    if (window.matchMedia) {
      try {
        matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
          readStored(function (stored) { if (!stored) applyTheme(e.matches ? 'dark' : 'light'); });
        });
      } catch (e) {}
    }
  })();
</script>
<style>
  /* ===== 设计令牌 ===== */
  :root {
    --xhs-red: #ff2442;          /* 品牌红（兼容 JS 内联引用） */
    --red: #ff2442;
    --red-hover: #e51e3a;
    --red-weak: #fff0f3;
    --red-border: #ffd2da;
    --red-ink: #c0392b;

    --bg: #ffffff;
    --surface: #ffffff;
    --surface-2: #f6f7f9;
    --surface-3: #eceef1;
    --border: #e8eaed;

    --fg: #16181d;               /* 兼容旧引用 */
    --text: #16181d;
    --text-2: #6b7280;
    --text-3: #9aa1ab;
    --muted: #8a8a8a;            /* 兼容 JS 内联引用 */

    --green: #0f6e56;
    --amber: #b8741a;

    --radius: 14px;
    --radius-sm: 10px;
    --radius-xs: 8px;

    --shadow-sm: 0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06);
    --shadow-md: 0 8px 20px rgba(16,24,40,.10);
    --shadow-red: 0 4px 12px rgba(255,36,66,.22);
  }
  [data-theme="dark"] {
    --red: #ff3b5c;
    --red-hover: #ff5274;
    --red-weak: #2c1820;
    --red-border: #4d2733;
    --red-ink: #ff8aa0;

    --bg: #0f1115;
    --surface: #171a20;
    --surface-2: #1d212a;
    --surface-3: #262b34;
    --border: #2a2f38;

    --fg: #f3f4f6;
    --text: #f3f4f6;
    --text-2: #9aa1ab;
    --text-3: #6b7280;
    --muted: #9aa1ab;

    --green: #2fd0a3;
    --amber: #e0a359;

    --shadow-sm: 0 1px 2px rgba(0,0,0,.35);
    --shadow-md: 0 10px 24px rgba(0,0,0,.45);
    --shadow-red: 0 4px 14px rgba(255,59,92,.28);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    width: 384px;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    color: var(--text);
    background: var(--bg);
    font-size: 13px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    transition: background .25s ease, color .25s ease;
  }

  /* ===== 顶部应用栏 ===== */
  .appbar {
    display: flex; align-items: center; gap: 11px;
    padding: 14px 16px 13px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
    transition: background .25s ease, border-color .25s ease;
  }
  .appbar .logo {
    width: 30px; height: 30px; border-radius: 8px; flex: none;
    box-shadow: var(--shadow-sm);
  }
  .appbar .titles { display: flex; flex-direction: column; line-height: 1.2; }
  .appbar .title { font-size: 15px; font-weight: 700; letter-spacing: .2px; }
  .appbar .sub { font-size: 11px; color: var(--text-2); margin-top: 1px; }
  .appbar .spacer { flex: 1; }
  .theme-btn {
    width: 32px; height: 32px; flex: none;
    border-radius: 9px; border: 1px solid var(--border);
    background: var(--surface-2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; transition: background .2s, transform .15s, border-color .2s;
  }
  .theme-btn:hover { background: var(--surface-3); transform: translateY(-1px); }
  .theme-btn:active { transform: scale(.94); }

  /* ===== 分段标签 ===== */
  .tabs {
    display: flex; gap: 4px;
    margin: 13px 16px 14px;
    background: var(--surface-2);
    padding: 4px; border-radius: 12px;
    transition: background .25s ease;
  }
  .tab {
    flex: 1; text-align: center; padding: 8px 4px;
    font-size: 12.5px; font-weight: 600; color: var(--text-2);
    cursor: pointer; border-radius: 9px; user-select: none;
    transition: color .2s, background .2s, box-shadow .2s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--surface); color: var(--red); box-shadow: var(--shadow-sm); }

  /* ===== 面板 ===== */
  .panel { display: none; padding: 0 16px 18px; }
  .panel.active { display: block; animation: fade .25s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

  /* ===== 表单字段 ===== */
  .field { margin-bottom: 13px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  textarea, input[type=email], input[type=password],
  select, input[type=number], input[type=time] {
    width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface-2); color: var(--text);
    font-size: 13px; padding: 9px 11px; outline: none; font-family: inherit;
    transition: border-color .15s, box-shadow .15s, background .25s;
  }
  textarea { height: 88px; resize: vertical; line-height: 1.55; }
  textarea::placeholder, input::placeholder { color: var(--text-3); }
  textarea:focus, input:focus, select:focus {
    border-color: var(--red); box-shadow: 0 0 0 3px var(--red-weak); background: var(--surface);
  }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .row .field { flex: 1; margin-bottom: 0; }
  .row .field.narrow { flex: none; width: 122px; }

  /* ===== 按钮 ===== */
  .btns { display: flex; gap: 8px; margin-top: 15px; flex-wrap: wrap; }
  button {
    font-family: inherit; border: none; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600; cursor: pointer;
    padding: 10px 12px; color: var(--text);
    transition: transform .08s ease, background .2s, box-shadow .2s, opacity .2s;
  }
  button:active { transform: scale(.97); }
  button:disabled { opacity: .45; cursor: not-allowed; }
  .btn-primary { background: var(--red); color: #fff; flex: 1; box-shadow: var(--shadow-red); }
  .btn-primary:hover:not(:disabled) { background: var(--red-hover); box-shadow: 0 6px 16px rgba(255,36,66,.32); }
  .btn-ghost { background: var(--surface-2); color: var(--text); flex: 1; }
  .btn-ghost:hover:not(:disabled) { background: var(--surface-3); }
  .btn-line { background: var(--surface); border: 1px solid var(--border); color: var(--text); flex: none; }
  .btn-line:hover:not(:disabled) { background: var(--surface-2); }

  /* ===== 状态卡 ===== */
  .status {
    margin-top: 13px; font-size: 12.5px; line-height: 1.6; color: var(--text-2);
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px; min-height: 20px;
    transition: background .25s, border-color .25s, color .25s;
  }
  .status .k { color: var(--red); font-weight: 700; }

  /* ===== 进度条 ===== */
  .progress { height: 7px; background: var(--surface-3); border-radius: 6px; overflow: hidden; margin-top: 10px; }
  .progress > i { display: block; height: 100%; width: 0; border-radius: 6px;
    background: linear-gradient(90deg, var(--red), #ff7a8c); transition: width .35s ease; }

  /* ===== 结果容器 / 表格 ===== */
  .results {
    margin-top: 12px; max-height: 224px; overflow: auto;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface);
    transition: background .25s, border-color .25s;
  }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--border); }
  th { position: sticky; top: 0; background: var(--surface-2); color: var(--text-2); font-weight: 600; font-size: 11px; }
  tbody tr { transition: background .15s; }
  tbody tr:hover { background: var(--surface-2); }
  td.lv { color: var(--red); font-weight: 700; width: 34px; text-align: center; }
  td.sc { color: var(--green); font-weight: 700; width: 44px; text-align: center; }
  td.tag { width: 36px; text-align: center; }
  .tag-new { display: inline-block; color: #fff; background: var(--red); border-radius: 5px; padding: 1px 6px; font-size: 10px; font-weight: 600; }
  .tag-keep { color: var(--text-3); font-size: 11px; }
  .empty { color: var(--text-3); padding: 18px; text-align: center; font-size: 12px; }

  /* ===== 标签 chip ===== */
  .chip {
    display: inline-block; background: var(--red-weak); color: var(--red-ink);
    border: 1px solid var(--red-border); border-radius: 6px;
    padding: 2px 8px; font-size: 11px; margin: 2px 5px 2px 0; line-height: 1.5;
  }

  /* ===== 卡片（分组块） ===== */
  .card {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px; margin-bottom: 12px;
    transition: background .25s, border-color .25s;
  }
  .card-title { font-size: 12px; font-weight: 600; margin-bottom: 9px; }

  /* ===== 底部操作行 / 提示 ===== */
  .foot { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
  .hint { font-size: 11px; color: var(--text-3); margin-top: 9px; line-height: 1.6; }

  /* ===== 近 7 日柱状 ===== */
  .hist { display: flex; gap: 4px; align-items: flex-end; height: 50px; margin-top: 8px; }
  .hist i { flex: 1; background: linear-gradient(180deg, var(--red), #ff7a8c); opacity: .85;
    border-radius: 3px 3px 0 0; min-width: 6px; transition: opacity .2s; }
  .hist i:hover { opacity: 1; }
  .hist span { font-size: 9px; color: var(--text-3); text-align: center; }
</style>
</head>
<body>
<div class="appbar">
  <img class="logo" src="icons/icon48.png" alt="红书选词助手">
  <div class="titles">
    <span class="title">红书选词助手</span>
    <span class="sub">批量采集 · 递归长尾 · 趋势雷达</span>
  </div>
  <span class="spacer"></span>
  <button class="theme-btn" id="themeToggle" title="切换深色 / 浅色" aria-label="切换主题">🌙</button>
</div>

<div class="tabs">
  <div class="tab active" data-tab="collect">采集</div>
  <div class="tab" data-tab="trend">趋势</div>
  <div class="tab" data-tab="history">历史</div>
  <div class="tab" data-tab="account">账号</div>
</div>

<!-- 采集面板 -->
<div id="panelCollect" class="panel active">
  <div class="field">
    <label for="seeds">种子词</label>
    <textarea id="seeds" placeholder="每行一个，例如：&#10;虾仁&#10;减脂餐&#10;一人食&#10;三文鱼"></textarea>
  </div>

  <div class="row">
    <div class="field">
      <label>递归层级</label>
      <select id="depth">
        <option value="1">1 层（仅种子）</option>
        <option value="2" selected>2 层（种子 + 下钻）</option>
        <option value="3">3 层（深度长尾）</option>
      </select>
    </div>
    <div class="field narrow">
      <label>间隔(ms)</label>
      <input id="delay" type="number" value="900" min="300" max="15000" step="100">
    </div>
  </div>

  <div class="btns">
    <button id="start" class="btn-primary">▶ 开始采集</button>
    <button id="stop" class="btn-ghost" style="display:none;">■ 停止</button>
    <button id="current" class="btn-line">采集当前下拉</button>
  </div>

  <div class="status" id="status">就绪。先打开小红书页面，再点开始。</div>
  <div class="progress"><i id="bar"></i></div>

  <div class="results" id="resultsBox">
    <div class="empty">暂无数据</div>
  </div>

  <div class="foot">
    <button id="exportCsv" class="btn-ghost">导出 CSV</button>
    <button id="exportTxt" class="btn-ghost">导出 TXT</button>
    <button id="copyWords" class="btn-line">📋 复制词</button>
    <button id="diagnose" class="btn-line">诊断</button>
    <button id="clear" class="btn-line">清空</button>
  </div>
  <p class="hint">建议间隔 ≥ 800ms；连续 5 次无词自动暂停。结果存本地。</p>
</div>

<!-- 趋势雷达面板 -->
<div id="panelTrend" class="panel">
  <div class="card">
    <div class="card-title">定时快照</div>
    <div class="row">
      <label style="display:flex;align-items:center;gap:6px;margin:0;font-weight:500;font-size:12px;color:var(--text-2);">
        <input type="checkbox" id="schOn" style="accent-color:var(--red);width:auto;"> 每日
      </label>
      <input id="schTime" type="time" value="09:00" style="width:96px;">
      <button id="schSave" class="btn-line" style="flex:none;">保存</button>
    </div>
    <p class="hint" style="margin-top:9px;margin-bottom:0;">到点用种子词跑 depth=1 存为当天快照，浏览器需开着。</p>
  </div>

  <div class="btns">
    <button id="snapNow" class="btn-primary">📷 立即快照</button>
  </div>

  <div class="status" id="trendStatus">点「立即快照」采集今天下拉词并对比昨天。</div>

  <div class="field" style="margin-top:13px;margin-bottom:0;">
    <label>新增词 <span id="newCount" style="color:var(--red);font-weight:700;">0</span></label>
    <div id="newBox" class="results" style="max-height:96px;">
      <div class="empty">—</div>
    </div>
  </div>

  <div class="field" style="margin-top:13px;margin-bottom:0;">
    <label>上升分排序</label>
    <div class="results" id="trendBox" style="max-height:152px;">
      <div class="empty">暂无快照</div>
    </div>
  </div>

  <div class="field" style="margin-top:13px;margin-bottom:0;">
    <label>近 7 日词量</label>
    <div class="hist" id="hist"></div>
  </div>

  <div class="foot">
    <button id="exportTrend" class="btn-ghost">导出趋势 CSV</button>
    <button id="clearTrend" class="btn-line">清空快照</button>
  </div>
</div>

<!-- 历史面板 -->
<div id="panelHistory" class="panel">
  <div class="row" style="margin-top:0;">
    <button id="syncHist" class="btn-line" style="flex:none;">从云端同步</button>
    <button id="refreshHist" class="btn-line" style="flex:none;">刷新</button>
    <button id="clearHist" class="btn-line" style="flex:none;">清空</button>
  </div>
  <div class="row" style="margin-top:9px;">
    <button id="exportHist" class="btn-ghost" style="flex:1;">⬇ 导出历史 CSV</button>
  </div>
  <div class="status" id="histStatus" style="margin-top:11px;">历史记录（采集批次 + 每日快照）</div>
  <div class="results" id="histBox" style="max-height:262px;">
    <div class="empty">暂无历史</div>
  </div>
  <div class="results" id="histDetail" style="max-height:184px;display:none;"></div>
</div>

<!-- 账号面板 -->
<div id="panelAccount" class="panel">
  <div id="acctAuth">
    <div class="field">
      <label>邮箱</label>
      <input id="sbEmail" type="email" placeholder="邮箱@example.com">
    </div>
    <div class="field">
      <label>密码</label>
      <input id="sbPass" type="password" placeholder="≥6 位">
    </div>
    <div class="btns">
      <button id="sbLoginBtn" class="btn-primary">登录</button>
      <button id="sbSignupBtn" class="btn-ghost">注册</button>
    </div>
    <p class="hint" id="acctHint"></p>
  </div>
  <div id="acctInfo" style="display:none;">
    <div class="status" id="acctStatus">已登录</div>
    <div class="btns"><button id="sbLogoutBtn" class="btn-ghost">登出</button></div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
